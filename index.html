<html>
<head>
    <title>login2</title>
    <style>
        body{
            background-color: rgb(136, 4, 123);
        }
        .main{
            height: 550px;
            width: 400px;
            background-color: white;
            margin: 90px 550px;
            border: none;
            border-radius: 5px;

        }
        .main h1{ 
            padding:30px 50px;
            
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        .e{
            padding:10px 30px ;
        }
        input[type=email]{
            border: none;
            border-bottom: 3px solid purple;
            width: 350px;
            height: 40px;
        }
        .p{
            padding:10px 30px ;
        }
        input[type=password]{
            border: none;
            border-bottom: 3px solid purple;
            width: 350px;
            height: 40px;
        }
        .s{
            padding:30px 30px;
        }
        .c{
            width: 350px;
            height: 40px;
            background-color: rgb(176, 4, 176);
            color: white;
            border: none;
            border-radius: 6px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        .para{
            padding: 0px 0px 10px 100px;
        }
        .para p{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 15px;
        }
        .b{
            padding: 0px 0px 0px 30px;
        }
        .b button{
            height: 40px;
            width: 350px;
            margin-bottom: 20px;
            border: none;
            border-radius: 7px;
            color: white;
            background-color: rgb(16, 184, 240);
        }
        button:hover{
            transform: scale(1.1);
            transition: 0.4s;
        }
@media screen and (max-width: 600px) {
    .main{
        width: 400px;
    }
    
}
        
        

    </style>
</head>
<body>
    <div class="main">
        <h1>Login</h1>
        <div class="e">
        <input type="email" placeholder="email">
        </div>
        <div class="p">
            <input type="password" placeholder="password">
        </div>
        <div class="s">
            <button class="c">Continue</button>
        </div>
        <div class="para">
            <p>or connect with social media</p>
        </div>
        <div class="b">
            <button>Sign in With Twitter</button>
            <button style="background-color: rgb(35, 97, 173);">Sign in With Facebook</button>


        </div>

        
    </div>
   
    
</body>
</html>
